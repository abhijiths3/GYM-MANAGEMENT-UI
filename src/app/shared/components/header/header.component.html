<mat-toolbar color="primary" class="header">

  <!-- Hamburger Menu -->
  <button mat-icon-button (click)="openMenu()">
    <mat-icon>menu</mat-icon>
  </button>

  <!-- Logo -->
  <div class="logo">
    Gym<span>Admin</span>
  </div>

  <!-- Spacer -->
  <span class="spacer"></span>

  <!-- Navigation -->
  <nav class="nav">

    <a mat-button routerLink="/coupon" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      Dashboard
    </a>

    <!-- Members Dropdown -->
    <button mat-button [matMenuTriggerFor]="menu">
      Members
    </button>

    <mat-menu #menu="matMenu">
      <button mat-menu-item routerLink="/members">Members</button>
      <button mat-menu-item routerLink="/addmember">New Member</button>
    </mat-menu>

    <a mat-button routerLink="/coupon" routerLinkActive="active">
      Coupons
    </a>

    <a mat-button routerLink="/attendance" routerLinkActive="active">
      Attendance
    </a>

  </nav>

</mat-toolbar>
